name: rakshaai_mobile
description: Native Android client for the RakshaAI safety platform.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_map: ^8.2.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  geolocator: ^14.0.2
  go_router: ^16.3.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  socket_io_client: ^3.1.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
