version: '3.9'

services:
  # ─── PostgreSQL with PostGIS ──────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: rakshaai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rakshaai}
      POSTGRES_USER:     ${POSTGRES_USER:-rakshaai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rakshaai_user} -d ${POSTGRES_DB:-rakshaai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rakshaai_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: rakshaai_backend
    restart: unless-stopped
    environment:
      NODE_ENV:           production
      DATABASE_URL:       postgresql://${POSTGRES_USER:-rakshaai_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rakshaai}
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT:               5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Next.js Web ──────────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-http://localhost}
    container_name: rakshaai_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: rakshaai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - web

volumes:
  postgres_data:
