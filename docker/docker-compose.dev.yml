version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: rakshaai_postgres_dev
    environment:
      POSTGRES_DB:       rakshaai_dev
      POSTGRES_USER:     rakshaai_user
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: rakshaai_redis_dev
    command: redis-server
    ports:
      - "6379:6379"

  # pgAdmin for DB inspection during development
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rakshaai_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@rakshaai.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_dev_data:
